services:
  mariadb:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_USER: cms_user
      MARIADB_PASSWORD: cms_password
      MARIADB_DATABASE: 3dprinting_cms
      MARIADB_RANDOM_ROOT_PASSWORD: "yes"
    volumes:
      - mariadbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://cms_user:cms_password@mariadb:3306/3dprinting_cms
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      UPLOAD_DIR: /app/public/uploads
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
    volumes:
      - uploads:/app/public/uploads

volumes:
  mariadbdata:
  uploads:
